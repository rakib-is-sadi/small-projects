<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <title>Current Time</title>
  </head>
  <body class="h-screen flex justify-center items-center bg-[#0f0f0f] text-white">
    <div id="current-time" class="flex items-end gap-5 font-bold p-20 bg-[#1f1f1f]">
      <div class="text-4xl sm:text-5xl bg-amber-300">
        <span id="hour">00</span>
        <span>:</span>
        <span id="minute">00</span>
        <span>:</span>
        <span id="second">00</span>
      </div>
      <p id="now" class="text-xs bg-amber-500">am</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
